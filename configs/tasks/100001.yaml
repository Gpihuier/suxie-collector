version: "1"

# 一租户一文件：文件名与 id 对齐，方便按租户定位任务。
tenants:
  - id: 100001
    tenant_id: 100001
    platform: lingxing
    enabled: true
    timezone: Asia/Shanghai

    rate_limit:
      rps: 2
      burst: 4

    variables:
      - type: list
        key: shop_id
        values:
          - shop_001

    jobs:
      - name: profit-report-msku
        # 示例默认关闭，配置好 mids/sids 和鉴权后再开启。
        enabled: false
        method: POST
        endpoint: /bd/profit/report/open/report/msku/list
        request_in: body
        parallelism: 1
        schedule:
          mode: interval
          every: 24h
        pagination:
          enabled: false
        params:
          # 接口文档默认值：offset=0, length=1000（上限 10000）
          offset: 0
          length: 1000
          # mids/sids 支持数组
          mids: [2]
          sids: [110]
          monthlyQuery: false
          startDate: "${window_start}"
          endDate: "${window_end}"
        variables:
          - type: date_window
            key_start: window_start
            key_end: window_end
            format: "2006-01-02"
            window: 24h
            start_from: "2026-01-01T00:00:00+08:00"
